<style>

    body {

        min-height: 1000px;

        background-color: var(--sidebar-bg);

        padding: 40px 30px;
    }

        width: 180px;
        height: 220px;
        object-fit: cover;
        border: 4px solid #fff;
        margin-bottom: 30px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .sidebar h2 {
        color: var(--text-light);
        border-bottom: 1px solid rgba(255,255,255,0.3);
        padding-bottom: 5px;
        font-size: 1.2em;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .sidebar p, .sidebar a {
        color: #ddd;
        font-size: 0.9em;
        text-decoration: none;
        word-break: break-all;
    }

    /* 右側主欄位樣式 */
    .main-content {
        padding: 50px 40px;
    }

    header {
        margin-bottom: 40px;
    }

    header h1 {
        font-size: 3em;
        margin: 0;
        letter-spacing: 5px;
        color: var(--text-dark);
    }

        font-size: 1.2em;
        color: #777;
        margin-top: 5px;
        text-transform: uppercase;
    }

    section {
        margin-bottom: 40px;
    }

    .main-content h2 {
        color: var(--text-dark);
        font-size: 1.5em;
        border-bottom: 2px solid var(--text-dark);
        display: inline-block;
        margin-bottom: 20px;
        padding-right: 20px;
    }

    ul {
        padding-left: 20px;
    }

    .btn-skill {
        background-color: #444;
        color: white;
        border: none;
        padding: 8px 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-skill:hover {
        background-color: var(--accent-color);
    }

    #skill-details {
        margin-top: 15px;
        padding: 15px;
        background: #f9f9f9;
        border-left: 3px solid var(--accent-color);
        display: none;

    @media (max-width: 768px) {
        .resume-container {
            grid-template-columns: 1fr;
