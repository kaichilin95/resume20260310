<!DOCTYPE html>

<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>林愷淇的個人履歷</title>

    <style>
    :root {
        --sidebar-bg: #5a5a5a; /* 側邊欄深灰色 */
        --main-bg: #ffffff;
        --accent-color: #3498db;
        --text-light: #ffffff;
        --text-dark: #333333;
    }

    body {
        font-family: "Microsoft JhengHei", Arial, sans-serif;
        background-color: #e0e0e0;
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        line-height: 1.6;
    }

    .resume-container {
        background: var(--main-bg);
        width: 100%;
        max-width: 900px;
        display: grid;
        grid-template-columns: 300px 1fr; /* 左右雙欄 */
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        min-height: 1000px;
    }

    /* 左側邊欄樣式 */
    .sidebar {
        background-color: var(--sidebar-bg);
        color: var(--text-light);
        padding: 40px 30px;
    }

    .profile-pic {
        width: 180px;
        height: 220px;
        object-fit: cover;
        border: 4px solid #fff;
        margin-bottom: 30px;
        display: block;
        margin-left: auto;
        margin-right: auto;
    }

    .sidebar h2 {
        color: var(--text-light);
        border-bottom: 1px solid rgba(255,255,255,0.3);
        padding-bottom: 5px;
        font-size: 1.2em;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .sidebar p, .sidebar a {
        color: #ddd;
        font-size: 0.9em;
        text-decoration: none;
        word-break: break-all;
    }

    /* 右側主欄位樣式 */
    .main-content {
        padding: 50px 40px;
    }

    header {
        margin-bottom: 40px;
    }

    header h1 {
        font-size: 3em;
        margin: 0;
        letter-spacing: 5px;
        color: var(--text-dark);
    }

    header .subtitle {
        font-size: 1.2em;
        color: #777;
        margin-top: 5px;
        text-transform: uppercase;
    }

    section {
        margin-bottom: 40px;
    }

    .main-content h2 {
        color: var(--text-dark);
        font-size: 1.5em;
        border-bottom: 2px solid var(--text-dark);
        display: inline-block;
        margin-bottom: 20px;
        padding-right: 20px;
    }

    ul {
        padding-left: 20px;
    }

    .btn-skill {
        background-color: #444;
        color: white;
        border: none;
        padding: 8px 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    .btn-skill:hover {
        background-color: var(--accent-color);
    }

    #skill-details {
        margin-top: 15px;
        padding: 15px;
        background: #f9f9f9;
        border-left: 3px solid var(--accent-color);
        display: none;
    }

    /* 響應式設計 */
    @media (max-width: 768px) {
        .resume-container {
            grid-template-columns: 1fr;
        }
        .sidebar {
            padding: 20px;
        }
    }
</style>

</head>

<body>



<div class="resume-container">

    <header>

        <img src="images/photo.jpg" alt="林愷淇的照片" class="profile-pic">

        <div class="header-info">

            <h1>林愷淇</h1>

            <p>學號：114018065</p>

            <p>聯絡信箱：<a href="mailto:114018065@asia.edu.tw">114018065@asia.edu.tw</a></p>

        </div>

    </header>



    <section>

        <h2>個人簡介</h2>

        <p>這是一個範例區塊，我目前就讀於亞洲大學。我對聽力與語言治療領域充滿熱情，致力於透過專業知識幫助有需要的人，並持續精進自己的溝通與臨床實踐技能。</p>

    </section>



    <section>

        <h2>學歷</h2>

        <ul>

            <li><strong>亞洲大學</strong> - 聽力暨語言治療學系</li>

        </ul>

    </section>



    <section>

        <h2>技能</h2>

        <p>點擊下方按鈕顯示核心技能</p>

        <button class="btn-skill" onclick="toggleSkills()">顯示技能詳情</button>

        

        <div id="skill-details">

            <ul>

                <li>聽力檢測與評估</li>

                <li>語言障礙治療規劃</li>

                <li>基礎網頁設計 (HTML/CSS)</li>

                <li>溝通與個案管理</li>

            </ul>

        </div>

    </section>

</div>



<script>

    // JavaScript 互動功能

    function toggleSkills() {

        var x = document.getElementById("skill-details");

        var btn = document.querySelector(".btn-skill");

        

        if (x.style.display === "none" || x.style.display === "") {

            x.style.display = "block";

            btn.textContent = "隱藏技能詳情";

        } else {

            x.style.display = "none";

            btn.textContent = "顯示技能詳情";

        }

    }

</script>



</body>

</html>
